<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩愈 - 唐宋八大家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0300 40%, #000 100%);
            font-family: "KaiTi", "Microsoft YaHei", "PingFang SC", "Noto Serif SC", serif;
            color: #e0d5c0;
            overflow-x: hidden;
        }

        /* ============ 顶部导航 ============ */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.3);
        }

        .back-btn {
            color: #c9a96e;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 3px;
            border: 1px solid #c9a96e;
            padding: 8px 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #c9a96e;
            color: #000;
        }

        .nav-title {
            color: #ffd700;
            font-size: 1.3rem;
            letter-spacing: 5px;
        }

        /* ============ 主内容区 ============ */
        .main-content {
            padding: 100px 50px 60px;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 50px;
            align-items: flex-start;
        }

        /* ============ 左侧肖像 ============ */
        .portrait-section {
            flex-shrink: 0;
            text-align: center;
        }

        .portrait-frame {
            width: 280px;
            height: 380px;
            border: 3px solid #c9a96e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(201, 169, 110, 0.5);
            position: relative;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portrait-frame .placeholder {
            width: 100%;
            height: 100%;
            background: #2a1a00;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c9a96e;
            font-size: 3rem;
        }

        .portrait-caption {
            margin-top: 15px;
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff8c00;
        }

        /* ============ 右侧详情 ============ */
        .detail-section {
            flex: 1;
        }

        .detail-card {
            background: rgba(20, 10, 0, 0.7);
            border: 2px solid rgba(201, 169, 110, 0.5);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .detail-card h1 {
            font-size: 2.5rem;
            color: #ffd700;
            letter-spacing: 8px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #ff8c00;
        }

        .detail-card .subtitle {
            font-size: 1rem;
            color: #c9a96e;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .detail-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, #c9a96e, transparent);
            margin: 20px 0;
        }

        .detail-card .info-row {
            display: flex;
            margin-bottom: 12px;
            font-size: 1.05rem;
        }

        .detail-card .info-label {
            color: #ffd700;
            width: 80px;
            flex-shrink: 0;
            letter-spacing: 3px;
        }

        .detail-card .info-value {
            color: #e0d5c0;
            letter-spacing: 2px;
        }

        .detail-card .bio-text {
            margin-top: 20px;
            line-height: 2;
            letter-spacing: 2px;
            text-align: justify;
            color: #d0c5b0;
        }

        /* ============ 诗词总结 ============ */
        .poem-section {
            margin-top: 30px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(201, 169, 110, 0.4);
            border-radius: 10px;
            padding: 25px 30px;
            text-align: center;
        }

        .poem-section .poem-label {
            color: #ffd700;
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .poem-section .poem-text {
            font-size: 1.2rem;
            line-height: 2.2;
            color: #e0d5c0;
            letter-spacing: 3px;
            font-style: italic;
        }

        /* ============ 开始游戏按钮 ============ */
        .game-btn-container {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 60px;
        }

        .start-game-btn {
            background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%);
            color: #1a0a00;
            border: none;
            padding: 16px 60px;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 8px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            transition: all 0.3s;
            font-family: inherit;
        }

        .start-game-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 70px rgba(255, 215, 0, 0.9);
        }

        /* ============ 响应式 ============ */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                align-items: center;
                padding: 90px 20px 40px;
            }
            .portrait-frame {
                width: 200px;
                height: 280px;
            }
            .detail-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <a href="select.html" class="back-btn">← 返回选择</a>
        <span class="nav-title">唐 宋 八 大 家</span>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- 左侧肖像 -->
        <div class="portrait-section">
            <div class="portrait-frame">
                <img src="images/hanyu.jpg" alt="韩愈"
                onerror="this.style.display='none'; this.parentNode.querySelector('.placeholder').style.display='flex';">
                <div class="placeholder" style="display:none;">韩愈</div>
            </div>
            <div class="portrait-caption">韩 愈</div>
        </div>

        <!-- 右侧详情 -->
        <div class="detail-section">
            <div class="detail-card">
                <h1>韩 愈</h1>
                <div class="subtitle">Han Yu · 唐宋八大家之首</div>
                <div class="detail-divider"></div>

                <div class="info-row">
                    <span class="info-label">字：</span>
                    <span class="info-value">退之</span>
                </div>
                <div class="info-row">
                    <span class="info-label">号：</span>
                    <span class="info-value">昌黎先生</span>
                </div>
                <div class="info-row">
                    <span class="info-label">朝代：</span>
                    <span class="info-value">唐 代</span>
                </div>
                <div class="info-row">
                    <span class="info-label">籍贯：</span>
                    <span class="info-value">河南河阳（今孟州）</span>
                </div>

                <p class="bio-text">
                    韩愈，字退之，唐代杰出的文学家、思想家、政治家。他倡导古文运动，主张"文以载道"，
                    反对骈俪文风，被苏轼誉为"文起八代之衰"。其散文气势磅礴，雄奇奔放，
                    代表作有《师说》《马说》《进学解》等。在政治上，他敢于直言进谏，
                    因谏迎佛骨被贬潮州，仍不改初心。韩愈以其卓越的文学成就和人格魅力，
                    被尊为"唐宋八大家"之首。
                </p>
            </div>

            <!-- 诗词总结 -->
            <div class="poem-section">
                <div class="poem-label">⚜ 诗 词 总 结 ⚜</div>
                <div class="poem-text">
                    「 师者，所以传道授业解惑也 」<br>
                    —— 《师说》
                </div>
            </div>
        </div>
    </div>

    <!-- 开始游戏按钮 -->
    <div class="game-btn-container">
        <button class="start-game-btn" onclick="startGame()">开 始 游 戏</button>
    </div>

    <script>
        function startGame() {
            // 将选择的英雄信息存储到 sessionStorage
            sessionStorage.setItem('selectedHero', JSON.stringify({
                id: 'hanyu',
                name: '韩愈',
                img: 'images/hanyu.jpg'
            }));
            document.body.style.transition = 'opacity 0.3s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'rank.html';
            }, 300);
        }
    </script>
</body>
</html>
